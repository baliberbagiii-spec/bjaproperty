<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Bina Jaya Abadi Properti</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <header class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="img/logo_bja.png" alt="BJA" class="h-10 w-auto" />
      </a>
      <nav class="hidden md:flex gap-6 text-slate-700">
        <a href="index.html" class="hover:text-emerald-600">Kembali ke Website</a>
        <button id="logout-btn" class="hover:text-emerald-600">Logout</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-10">
    <h1 class="text-3xl font-bold text-slate-900 mb-6">Admin Panel - Kelola Properti</h1>

    <div class="mb-6">
      <button id="add-btn" class="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-500">Tambah Properti Baru</button>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full table-auto">
        <thead class="bg-slate-50">
          <tr>
            <th class="px-4 py-2 text-left">Nama Properti</th>
            <th class="px-4 py-2 text-left">Lokasi</th>
            <th class="px-4 py-2 text-left">Harga</th>
            <th class="px-4 py-2 text-left">Status</th>
            <th class="px-4 py-2 text-center">Aksi</th>
          </tr>
        </thead>
        <tbody id="properties-table">
          <!-- Dinamis populated -->
        </tbody>
      </table>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
      <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h2 id="modal-title" class="text-xl font-bold mb-4">Tambah Properti</h2>
        <form id="property-form">
          <input type="hidden" id="property-id" />
          <div class="mb-4">
            <label class="block text-sm font-medium">Nama Properti</label>
            <input type="text" id="idnama_properti" class="w-full border rounded px-3 py-2" required />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">Lokasi</label>
            <input type="text" id="lokasi" class="w-full border rounded px-3 py-2" required />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">Harga</label>
            <input type="text" id="harga" class="w-full border rounded px-3 py-2" required />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">Deskripsi</label>
            <textarea id="deskripsi" class="w-full border rounded px-3 py-2" rows="3"></textarea>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">Status</label>
            <select id="status" class="w-full border rounded px-3 py-2">
              <option value="tersedia">Tersedia</option>
              <option value="jual">Jual</option>
              <option value="sewa">Sewa</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">URL Gambar</label>
            <input type="url" id="url_gambar" class="w-full border rounded px-3 py-2" />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">URL Maps</label>
            <input type="url" id="url_maps" class="w-full border rounded px-3 py-2" />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">Luas Tanah</label>
            <input type="text" id="luas_tanah" class="w-full border rounded px-3 py-2" />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">Status Sertifikat</label>
            <input type="text" id="status_sertifikat" class="w-full border rounded px-3 py-2" />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">Akses Jalan</label>
            <input type="text" id="akses_jalan" class="w-full border rounded px-3 py-2" />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium">Hook</label>
            <input type="text" id="hook" class="w-full border rounded px-3 py-2" />
          </div>
          <div class="flex gap-2">
            <button type="submit" class="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-500">Simpan</button>
            <button type="button" id="cancel-btn" class="px-4 py-2 bg-slate-600 text-white rounded hover:bg-slate-500">Batal</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    // Check login
    if (localStorage.getItem('admin_logged_in') !== 'true') {
      window.location.href = 'login.html';
    }

    const API_BASE = 'https://script.google.com/macros/s/AKfycbx-S6Ci6nKFPn0QMtXwQFKYyrU0_5TKz6KleBQsP-6E9SPJawh9xpRX0F1dnKwnRRLhiQ/exec';

    async function fetchProperties() {
      const response = await fetch(`${API_BASE}?action=properties`);
      return await response.json();
    }

    function populateTable(properties) {
      const tbody = document.getElementById('properties-table');
      tbody.innerHTML = properties.map(p => `
        <tr>
          <td class="px-4 py-2">${p.idnama_properti}</td>
          <td class="px-4 py-2">${p.lokasi}</td>
          <td class="px-4 py-2">${formatRupiah(p.harga)}</td>
          <td class="px-4 py-2">${p.status}</td>
          <td class="px-4 py-2 text-center">
            <button class="edit-btn px-2 py-1 bg-blue-600 text-white rounded text-sm" data-id="${p.idnama_properti}">Edit</button>
            <button class="delete-btn px-2 py-1 bg-red-600 text-white rounded text-sm ml-2" data-id="${p.idnama_properti}">Hapus</button>
          </td>
        </tr>
      `).join('');
    }

    function formatRupiah(amount) {
      if (!amount) return 'Harga tidak tersedia';
      const num = parseInt(amount.replace(/[^\d]/g, ''));
      if (isNaN(num)) return amount;
      return 'Rp ' + num.toLocaleString('id-ID');
    }

    function showModal(property = null) {
      const modal = document.getElementById('modal');
      const form = document.getElementById('property-form');
      const title = document.getElementById('modal-title');
      if (property) {
        title.textContent = 'Edit Properti';
        document.getElementById('property-id').value = property.idnama_properti;
        Object.keys(property).forEach(key => {
          const el = document.getElementById(key);
          if (el) el.value = property[key] || '';
        });
      } else {
        title.textContent = 'Tambah Properti';
        form.reset();
        document.getElementById('property-id').value = '';
      }
      modal.style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function saveProperty(data) {
      const response = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: data.idnama_properti ? 'update-property' : 'add-property', ...data })
      });
      return await response.json();
    }

    async function deleteProperty(id) {
      const response = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'delete-property', idnama_properti: id })
      });
      return await response.json();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      let properties = await fetchProperties();
      populateTable(properties);

      document.getElementById('add-btn').addEventListener('click', () => {
        console.log('Add button clicked');
        showModal();
      });

      document.getElementById('cancel-btn').addEventListener('click', hideModal);

      document.getElementById('logout-btn').addEventListener('click', () => {
        localStorage.removeItem('admin_logged_in');
        window.location.href = 'login.html';
      });

      document.getElementById('property-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log('Form submitted');
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);
        console.log('Form data:', data);
        try {
          const result = await saveProperty(data);
          console.log('Save result:', result);
          if (result.status === 'success') {
            hideModal();
            properties = await fetchProperties();
            populateTable(properties);
          } else {
            alert('Error: ' + result.message);
          }
        } catch (error) {
          console.error('Error saving property:', error);
          alert('Gagal menyimpan properti: ' + error.message);
        }
      });

      document.addEventListener('click', async (e) => {
        if (e.target.classList.contains('edit-btn')) {
          const id = e.target.dataset.id;
          const property = properties.find(p => p.idnama_properti === id);
          showModal(property);
        } else if (e.target.classList.contains('delete-btn')) {
          if (confirm('Yakin hapus properti ini?')) {
            const id = e.target.dataset.id;
            const result = await deleteProperty(id);
            if (result.status === 'success') {
              properties = await fetchProperties();
              populateTable(properties);
            } else {
              alert('Error: ' + result.message);
            }
          }
        }
      });
    });
  </script>
</body>
</html>
